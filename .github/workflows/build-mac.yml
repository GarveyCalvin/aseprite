name: Build Aseprite (macOS + Release)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: brew install ninja

      - name: Install CMake
        run: brew install cmake

      - name: Install Skia dependency tools
        run: brew install curl unzip

      - name: Download Skia
        shell: bash
        run: |
          mkdir skia
          cd skia

          # Aseprite 官方脚本获取 Skia URL
          SKIA_URL="https://github.com/aseprite/skia/releases/latest/download/Skia-macOS-Release-arm64.zip"

          echo "Downloading Skia from $SKIA_URL"
          curl -L -o skia.zip $SKIA_URL
          unzip skia.zip

          ls -R

      - name: Configure
        shell: bash
        run: |
          mkdir build

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=ON \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$PWD/skia \
            -DSKIA_LIBRARY_DIR=$PWD/skia/out/Release-arm64

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Package .app
        run: |
          cd build/bin

          echo "Creating app bundle zip..."
          zip -r Aseprite-macOS.zip aseprite.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-macOS
          path: build/bin/Aseprite-macOS.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/Aseprite-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
